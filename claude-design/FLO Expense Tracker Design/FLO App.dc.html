  :root {

    --flo-primary: var(--flo-primary);                                              /* brand lime — primary CTA/accents */

    --flo-primary-strong: color-mix(in srgb, var(--flo-primary) 82%, #000);   /* gradients / pressed */
    --flo-primary-ink:    color-mix(in srgb, var(--flo-primary) 56%, #000);   /* readable lime text + income */
    --flo-primary-tint:   color-mix(in srgb, var(--flo-primary) 22%, #fff);   /* pale lime surfaces */
    /* ---- typography tokens ---- */
    --flo-font: 'Manrope', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--flo-font); background: #E8E9EB; -webkit-font-smoothing: antialiased; }
  a { color: var(--flo-primary-ink); text-decoration: none; }
  a:hover { color: var(--flo-primary-strong); }
  .flo-scroll::-webkit-scrollbar { display: none; }
  .flo-scroll { scrollbar-width: none; }
  @keyframes flo-confetti {
    0%   { transform: translateY(-30px) rotate(0deg);   opacity: 0; }
    12%  { opacity: 1; }
    100% { transform: translateY(760px) rotate(680deg);  opacity: 0.9; }
  }
  @keyframes flo-pop {
    0%,100% { transform: rotate(var(--r,0deg)) scale(1); }
    50%     { transform: rotate(var(--r,0deg)) scale(1.12); }
  }
</style>

<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot; },
  &quot;primaryColor&quot;: {
    &quot;editor&quot;: &quot;color&quot;,
    &quot;default&quot;: &quot;#BBDC12&quot;,
    &quot;tsType&quot;: &quot;string&quot;,
    &quot;section&quot;: &quot;Theme&quot;,
    &quot;options&quot;: [&quot;#BBDC12&quot;, &quot;#2A6FDB&quot;, &quot;#7C5CFC&quot;, &quot;#FF6B4A&quot;, &quot;#12C7A0&quot;]
  },
  &quot;inkColor&quot;: {
    &quot;editor&quot;: &quot;color&quot;,
    &quot;default&quot;: &quot;#101010&quot;,
    &quot;tsType&quot;: &quot;string&quot;,
    &quot;section&quot;: &quot;Theme&quot;,
    &quot;options&quot;: [&quot;#101010&quot;, &quot;#141821&quot;, &quot;#1A1420&quot;]
  },
  &quot;fontFamily&quot;: {
    &quot;editor&quot;: &quot;enum&quot;,
    &quot;default&quot;: &quot;Manrope&quot;,
    &quot;tsType&quot;: &quot;string&quot;,
    &quot;section&quot;: &quot;Theme&quot;,
    &quot;options&quot;: [&quot;Manrope&quot;, &quot;system-ui&quot;, &quot;Georgia&quot;]
  }
}">
class Component extends DCLogic {
  applyTheme() {
    const root = document.documentElement;
    root.style.setProperty('--flo-primary', this.props.primaryColor || '#BBDC12');
    root.style.setProperty('--flo-ink', this.props.inkColor || '#101010');
    root.style.setProperty('--flo-font', (this.props.fontFamily || 'Manrope') + ", system-ui, sans-serif");
  }
  componentDidMount() { this.applyTheme(); }
  componentDidUpdate() { this.applyTheme(); }
  renderVals() {
    const colors = ['var(--flo-primary)', '#2A6FDB', '#7C5CFC', '#FF6B4A', '#12C7A0', '#E8A317'];
    const pieces = [];
    for (let i = 0; i < 44; i++) {
      const left = (i * 2.3 + (i * 37 % 11)) % 100;
      const delay = ((i * 53 % 100) / 100 * 3.2).toFixed(2);
      const dur = (2.6 + (i * 29 % 100) / 100 * 2.2).toFixed(2);
      const w = 6 + (i % 5);
      const h = 9 + (i % 7);
      const round = i % 3 === 0;
      pieces.push(React.createElement('span', {
        key: i,
        style: {
          position: 'absolute', top: '-24px', left: left + '%',
          width: w + 'px', height: h + 'px',
          background: colors[i % colors.length],
          borderRadius: round ? '99px' : '2px',
          opacity: 0,
          animation: 'flo-confetti ' + dur + 's linear ' + delay + 's infinite'
        }
      }));
    }
    const confetti = React.createElement('div', {
      style: { position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none', borderRadius: '46px' }
    }, pieces);
    return { confetti };
  }
}
</script>
